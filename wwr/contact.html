<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Us | White Water Rafting">
    <meta name="author" content="Francisco Javier Alonso G">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-blue.jpg" alt="WWR Logo" class="logo">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-header">
            <h1>Contact Us!</h1>
            <p><strong>Address:</strong> Boulevard A.L.M #999, Zona Escolar, GAM, CDMX </p>
            <p><strong>Phone:</strong> +52 4611773370</p>
            <p><strong>Email:</strong> falonsogonzalez@byupathay.edu</p>
        </section>

        <div class="contact-grid">
            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d7520.0745397519495!2d-99.14819391890171!3d19.540013417348344!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2sus!4v1775800258243!5m2!1ses-419!2sus"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="form-container">
                <form action="#" method="post">
                    <div class="form-item">
                        <label for="user_name">Name:</label>
                        <input type="text" id="user_name" name="user_name"
                          placeholder="Enter your name" required>
                    </div>

                    <div class="form-item">
                        <label for="user_email">Email:</label>
                        <input type="email" id="user_email" name="user_email"
                          placeholder="Enter your email" required>
                    </div>

                    <fieldset>
                        <legend>Message Purpose:</legend>
                        <input type="radio" id="general" name="purpose" value="general" checked>
                        <label for="general">General Inquiry</label><br>

                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label><br>

                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        <label for="suggestion">Website Suggestion</label>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5"
                          placeholder="Type here"></textarea>
                    </div>

                    <div class="form-item checkbox">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">Please Subscribe me to the monthly
                            newsletter</label>
                    </div>

                    <button type="submit" class="submit-btn">Send Your Message</button>
                </form>
            </div>

            <section class="employee-section">
                <h2>We are here to guide you!</h2>
                <div class="employee-grid">
                    <figure>
                        <img src="images/mypicture.jpeg" alt="CEO Profile">
                        <figcaption><strong>Francisco Alonso</strong><br>Founder & CEO</figcaption>
                    </figure>
                    <figure>
                        <img src="images/robert.jpg" alt="Head Guide Profile">
                        <figcaption><strong>Robert Downey Jr</strong><br>Head River Guide
                        </figcaption>
                    </figure>
                    <figure>
                        <img src="images/tom.jpg" alt="Safety Manager Profile">
                        <figcaption><strong>Tom Crusie</strong><br>Safety Manager</figcaption>
                    </figure>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>© 2026 Rafting Adventures Co. - Francisco Javier Alonso G.</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank"><img src="images/facebooklogo.svg"
                  alt="Facebook"></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagramlogo.svg"
                  alt="Instagram"></a>
            <a href="https://tiktok.com" target="_blank"><img src="images/tiktoklogo.svg"
                  alt="TikTok"></a>
        </nav>
    </footer>
</body>

</html>
